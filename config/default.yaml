# Photocatalysis Extraction Pipeline Configuration (Default Settings)

# Global pipeline configuration
pipeline:
  stages: "all"            # List of stages to run (extract-pdf, extract-web, build, clean, validate) or "all"
  schema_file: "specs/dataset_schema.json" # Path to data schema file

# Parameter configurations for individual stages
stages:
  # Stage 1: Merge Supplementary Information PDF files (run inside extract-pdf)
  merge_si:
    pdf_dir: "data/raw/pdf"
    output_pdf_dir: "data/interim/pdf"

  # Stage 2: Parse PDF layout using MinerU (run inside extract-pdf)
  ingest:
    pdf_dir: "data/interim/pdf"
    ingested_dir: "data/interim/ingested"
    force: false                   # Force layout preview generation
    extraction_model: "vlm"        # MinerU mode: "vlm" or "pipeline"
    enable_formula: true           # Enable LaTeX equation parsing
    enable_table: true             # Enable table structure detection
    enable_ocr: false              # Force OCR for scans
    ocr_language: "en"             # OCR language

  # Stage 3: Extract structured parameters using Gemini API (run inside extract-pdf)
  extract:
    ingested_dir: "data/interim/ingested"
    extracted_dir: "data/interim/extracted"
    force: false                   # Force Gemini re-extraction
    model: "gemini-2.5-flash"      # Model to use for extraction
    max_retries: 5
    retry_delay: 5

  # Stage 4: Download and filter datasets from Zenodo (run inside extract-web)
  download:
    query: "photocatalytic degradation dye dataset"
    output_dir: "data/raw/external"
    limit: 10
    filter_mode: "llm"             # Filter modes: "none", "llm", "interactive"
    llm:
      metadata_model: "gemini-2.5-flash"  # Model for metadata relevance
      content_model: "gemini-3.1-flash-lite"    # Model for dataset preview relevance
      max_retries: 5
      retry_delay: 5

  # Stage 5: Clean, PubChem enrich, and validate dataset
  clean:
    input_file: "data/interim/merged_records.csv"
    output_file: "data/processed/dataset.csv"
    pubchem_cache_file: "data/interim/pubchem_cache.json"
    units_file: "specs/units.json"
    vocabularies_file: "specs/vocabularies.json"
    reports_dir: "reports"

